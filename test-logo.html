<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: flex;
  align-items: center;
  height: 72px;
  background: #eee;
}
.logo-no-height {
  width: 200px;
  background-color: red;
}
.logo-with-height {
  width: 200px;
  height: 32px;
  background-color: blue;
}
</style>
</head>
<body>
<div class="container">
  <div class="logo-no-height">A</div>
</div>
<div class="container">
  <div class="logo-no-height"></div> <!-- height 0 -->
</div>
<div class="container">
  <div class="logo-with-height"></div> <!-- height 32 -->
</div>
</body>
</html>
